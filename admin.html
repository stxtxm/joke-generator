<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin — Curated Examples & Exports</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;background:#0b1220;color:#e6eef8;padding:20px}
    .box{background:#0f1724;padding:16px;border-radius:8px;margin-bottom:12px}
    input,textarea{width:100%;box-sizing:border-box;padding:8px;margin-top:6px;background:#071026;border:1px solid #13324a;color:#e6eef8}
    button{padding:8px 12px;margin-top:8px;background:#0ea5a4;border:none;color:#042022;border-radius:6px}
    ul{padding-left:20px}
    pre{background:#071826;padding:12px;border-radius:6px;overflow:auto}
  </style>
</head>
<body>
  <h2>Curated Examples</h2>
  <div class="box">
    <label>Example text</label>
    <textarea id="exampleText" rows="3"></textarea>
    <label>Notes (optional)</label>
    <input id="exampleNotes" />
    <div>
      <label><input type="checkbox" id="exampleApproved" /> Approved</label>
    </div>
    <button id="addBtn">Add Example</button>
  </div>

  <div class="box">
    <h3>Existing</h3>
    <ul id="examplesList"></ul>
  </div>

  <div class="box">
    <h3>Exports</h3>
    <button id="trigger">Trigger Export Now</button>
    <button id="list">List Exports</button>
    <pre id="exports"></pre>
  </div>

  <script>
    async function load() {
      const r = await fetch('/admin/curated');
      const rows = await r.json();
      const ul = document.getElementById('examplesList'); ul.innerHTML='';
      rows.forEach(rw => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${rw.approved? '✓':''}</strong> ${rw.content} <button data-id='${rw.id}'>Del</button>`;
        ul.appendChild(li);
        li.querySelector('button').onclick = async () => { await fetch('/admin/curated/'+rw.id, { method:'DELETE' }); load(); };
      });
    }
    document.getElementById('addBtn').onclick = async () => {
      const content = document.getElementById('exampleText').value.trim();
      if (!content) return alert('content required');
      const notes = document.getElementById('exampleNotes').value || '';
      const approved = document.getElementById('exampleApproved').checked ? 1 : 0;
      await fetch('/admin/curated', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({content, notes, approved}) });
      document.getElementById('exampleText').value=''; document.getElementById('exampleNotes').value=''; document.getElementById('exampleApproved').checked=false;
      load();
    };

    document.getElementById('trigger').onclick = async () => {
      const r = await fetch('/admin/trigger-export');
      const j = await r.json();
      document.getElementById('exports').textContent = JSON.stringify(j,null,2);
    };
    document.getElementById('list').onclick = async () => {
      const r = await fetch('/admin/exports-list');
      const j = await r.json();
      document.getElementById('exports').textContent = JSON.stringify(j,null,2);
    };

    load();
  </script>
</body>
</html>
