services:
  ollama:
    image: ollama/ollama:latest
    container_name: joke-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

  app:
    build: .
    container_name: joke-app
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma2:2b}
      - TAILSCALE_IP=${TAILSCALE_IP:-0.0.0.0}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama-data:
