services:
  ollama:
    image: ollama/ollama:latest
    container_name: joke-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

  app:
    build:
      context: .
      target: prod
    container_name: joke-app
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma2:2b}
      - "TRAIN_CMD=${TRAIN_CMD:-/app/scripts/train_dummy_finetune.sh %EXPORT% %OUTDIR%}"
      - TAILSCALE_IP=${TAILSCALE_IP:-0.0.0.0}
    # In production we don't mount the source tree; the image contains the built app.
    # Keep a named volume for node_modules if you need to persist it locally during development.
    volumes:
      - /app/node_modules
      - ./scripts:/app/scripts
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama-data:
