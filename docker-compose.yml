version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: joke-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    container_name: joke-app
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TAILSCALE_IP=${TAILSCALE_IP:-0.0.0.0}
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data: